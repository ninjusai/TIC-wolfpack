name: Mission Control CI

on:
  push:
    branches: [main]
    paths:
      - 'mission-control/**'
      - '.github/workflows/mission-control.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mission-control/**'
      - '.github/workflows/mission-control.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mission-control/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: mission-control

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: mission-control

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: lint-and-check
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mission-control/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mission-control/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('mission-control/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: npm ci
        working-directory: mission-control

      - name: Cargo check
        run: cargo check
        working-directory: mission-control/src-tauri

      - name: Build Tauri application
        run: npm run tauri build
        working-directory: mission-control

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            mission-control/src-tauri/target/release/bundle/msi/*.msi
            mission-control/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14

